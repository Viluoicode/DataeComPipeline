# ========================================================================
#  ECommerPipeline — full stack in one command
#
#  Usage:
#    docker compose up -d              # start everything
#    docker compose logs -f api        # tail backend logs
#    docker compose down               # stop
#    docker compose down -v            # stop + wipe SQL data volume
#
#  Then open: http://localhost
#    /            → storefront landing
#    /admin       → admin dashboard
#    /hangfire    → background jobs
#    /scalar/v1   → API docs
#
#  SQL Server is also reachable at localhost:1433 if you need to inspect
#  with SSMS (user: sa, password: see SA_PASSWORD below).
# ========================================================================

services:

  # ----- SQL Server 2022 ------------------------------------------------
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecom-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "EcomDemo!2026Strong"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
      - backups:/var/opt/mssql/backups   # nightly .bak files (BackupDatabaseJob)
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'EcomDemo!2026Strong' -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      retries: 12
      start_period: 30s
      timeout: 5s

  # ----- Backend API ----------------------------------------------------
  api:
    build:
      context: .
      dockerfile: src/ECommerPipeline.Api/Dockerfile
    container_name: ecom-api
    depends_on:
      sql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      # The Docker SQL Server CAN create databases (unlike Azure SQL), so override
      # appsettings.Production.json's AutoCreate=false — otherwise the OLAP database
      # is never created and startup fails with "Cannot open database ..._Olap".
      Database__AutoCreate: "true"
      ConnectionStrings__OltpConnection:      "Server=sql;Database=ECommerPipeline_Oltp;User Id=sa;Password=EcomDemo!2026Strong;TrustServerCertificate=True;Encrypt=False;"
      ConnectionStrings__OlapConnection:      "Server=sql;Database=ECommerPipeline_Olap;User Id=sa;Password=EcomDemo!2026Strong;TrustServerCertificate=True;Encrypt=False;"
      ConnectionStrings__HangfireConnection:  "Server=sql;Database=ECommerPipeline_Hangfire;User Id=sa;Password=EcomDemo!2026Strong;TrustServerCertificate=True;Encrypt=False;"
      # Smaller seed for first-up demo (override if you want full benchmark data)
      Seed__CustomerCount: "500"
      Seed__ProductCount: "100"
      Seed__OrderCount: "5000"
      # JWT — demo secret (32+ chars). ROTATE this for a real deployment.
      Jwt__Secret:    "ecompipeline-demo-jwt-secret-rotate-in-prod-2026-xyz"
      Jwt__Issuer:    "ECommerPipeline"
      Jwt__Audience:  "ECommerPipeline.Client"
      # OpenTelemetry — export traces to Jaeger via OTLP gRPC
      Otel__Endpoint: "http://jaeger:4317"
      # AI Analyst service (internal) — /api/ask proxies here
      Analyst__BaseUrl: "http://analyst-api:8080"
      # Payments (VNPay/MoMo sandbox). Frontend + API share an origin via nginx,
      # so the post-payment redirect can be a relative path. Fill in the sandbox
      # credentials below to enable online checkout (sandbox is free to register:
      # VNPay → sandbox.vnpayment.vn/devreg, MoMo → developers.momo.vn). Until
      # then, COD still works and online methods are disabled in the UI.
      Payments__FrontendResultUrl:   "/payment-result"
      Payments__VnPay__TmnCode:      ""
      Payments__VnPay__HashSecret:   ""
      Payments__VnPay__ReturnUrl:    "http://localhost/api/payments/vnpay/return"
      Payments__Momo__PartnerCode:   ""
      Payments__Momo__AccessKey:     ""
      Payments__Momo__SecretKey:     ""
      Payments__Momo__ReturnUrl:     "http://localhost/api/payments/momo/return"
      Payments__Momo__IpnUrl:        "http://localhost/api/payments/momo/ipn"
      # Transactional email via MailHog (dev SMTP sink). Open http://localhost:8025
      # to read every order/payment email. Swap for real SMTP in production.
      Email__Provider: "Smtp"
      Email__Host:     "mailhog"
      Email__Port:     "1025"
      Email__FromEmail: "no-reply@ecompipeline.local"
      Email__FromName:  "ECommerPipeline"
      # Hangfire dashboard (prod) is HTTP Basic-auth protected. Change these.
      Hangfire__DashboardUser:     "admin"
      Hangfire__DashboardPassword: "admin123"
      # Redis — distributed cache (AI answers) + SignalR backplane → horizontal scale.
      ConnectionStrings__Redis: "redis:6379"
      # Nightly OLTP backup writes here (path is on the SQL Server container).
      Backup__Directory: "/var/opt/mssql/backups"
      # Commerce — shipping fee / free-ship threshold / VAT applied at checkout.
      Commerce__ShippingFee: "30000"
      Commerce__FreeShippingThreshold: "500000"
      Commerce__VatRate: "0.08"
      # Product images saved here (persisted via the product_images volume).
      Storage__ProductImages: "/app/uploads/products"
    volumes:
      - product_images:/app/uploads/products
    ports:
      # Direct API access for debugging (frontend proxies via nginx anyway)
      - "5193:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 15s
      retries: 8
      start_period: 60s
      timeout: 5s

  # ----- MailHog — dev SMTP sink (captures all outgoing email) ----------
  # SMTP on :1025 (api sends here), web UI on http://localhost:8025 to read them.
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: ecom-mailhog
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP

  # ----- Frontend (Nginx + built SPA) -----------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecom-frontend
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"

  # ----- Jaeger — OpenTelemetry trace visualization ---------------------
  # All-in-one image: in-memory storage, OTLP receiver, query UI.
  # Open http://localhost:16686 to explore traces (request → DB → ETL).
  # NOT for production — use dedicated tempo/cassandra backend instead.
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: ecom-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver

  # ----- AI Data Analyst: NL→SQL query layer on the Gold layer ----------
  # One-shot: creates the read-only `analyst_ro` principal on the OLAP DB
  # (SELECT on gold only). Idempotent; exits after running.
  analyst-db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecom-analyst-db-init
    depends_on:
      api:
        condition: service_healthy   # ecom-api creates ECommerPipeline_Olap + gold schema on startup
    volumes:
      - ./ai-analyst/db:/db:ro
    restart: "no"
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        /opt/mssql-tools18/bin/sqlcmd -S sql -U sa -P "EcomDemo!2026Strong" -No -b \
          -i /db/create_readonly_user.ecommerce.sql
        echo 'analyst read-only user ready.'

  # The NL→SQL service. Connects to the pipeline OLAP DB as analyst_ro and
  # queries the Gold layer via schema.ecommerce.json. Offline provider by
  # default (zero keys); set Analyst__Provider=OpenAI + keys for real answers.
  analyst-api:
    build:
      context: ./ai-analyst
      dockerfile: Dockerfile
    container_name: ecom-analyst-api
    depends_on:
      analyst-db-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Analyst: "Server=sql,1433;Database=ECommerPipeline_Olap;User Id=analyst_ro;Password=Readonly#Analyst1;TrustServerCertificate=True;Encrypt=False"
      Analyst__Provider: "Offline"
      Analyst__SchemaConfigPath: "config/schema.ecommerce.json"
    ports:
      - "8090:8080"   # http://localhost:8090 — Ask-data demo UI + POST /ask

  # ----- Redis — distributed cache + SignalR backplane ------------------
  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"

  # ----- Prometheus — scrapes API /metrics ------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ecom-prometheus
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"   # http://localhost:9090

  # ----- Grafana — dashboards over Prometheus ---------------------------
  # Prometheus datasource is auto-provisioned. Login: admin / admin (change it).
  grafana:
    image: grafana/grafana:11.2.0
    container_name: ecom-grafana
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"   # http://localhost:3000

volumes:
  sql_data:
  backups:
  grafana_data:
  product_images:
