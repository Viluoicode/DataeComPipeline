name: Deploy to VPS

# Manual by default. Uncomment the `push` trigger to auto-deploy on merge to main.
# Requires repo secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_APP_DIR.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy + smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.VPS_APP_DIR }}"

            # Keep the current image tag so we can roll back if the smoke test fails.
            PREV=$(git rev-parse HEAD)
            echo "Deploying from $PREV ..."

            git fetch --all
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml up -d --build

            # Smoke test: wait for /health to return 200 (up to ~100s).
            ok=0
            for i in $(seq 1 20); do
              code=$(curl -fsS -o /dev/null -w "%{http_code}" https://localhost/health || echo 000)
              if [ "$code" = "200" ]; then ok=1; break; fi
              sleep 5
            done

            if [ "$ok" != "1" ]; then
              echo "Smoke test FAILED — rolling back to $PREV"
              git reset --hard "$PREV"
              docker compose -f docker-compose.prod.yml up -d --build
              exit 1
            fi
            echo "Deploy OK."
