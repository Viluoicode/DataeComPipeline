name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  #  Backend — restore, build, test (xUnit) with coverage
  # ============================================================
  backend:
    name: Backend (.NET 9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (no restore)
        run: dotnet build --no-restore --configuration Release

      - name: Test with coverage
        run: >
          dotnet test --no-build --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults
          retention-days: 7

  # ============================================================
  #  Frontend — install, type-check, build
  # ============================================================
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ============================================================
  #  Docker — verify images build (no push)
  # ============================================================
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f src/ECommerPipeline.Api/Dockerfile -t ecom-api:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t ecom-frontend:ci ./frontend

      # ---- Supply-chain: scan the API image + emit an SBOM ----
      # Report-only for now (exit-code 0). Flip to exit-code 1 once the base
      # image is patched, to gate merges on HIGH/CRITICAL CVEs.
      - name: Scan API image (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ecom-api:ci
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ecom-api:ci
          format: spdx-json
          output-file: sbom-api.spdx.json

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-api
          path: sbom-api.spdx.json
          retention-days: 14
